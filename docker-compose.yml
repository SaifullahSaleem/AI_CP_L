# =============================================================================
# Docker Compose — Multi-Service Orchestration
# =============================================================================
# Services:
#   1. agent-api  — FastAPI + LangGraph agent (port 8000)
#   2. redis      — Checkpoint / session state database
#
# Service Discovery:
#   Docker Compose creates a shared network. The API references Redis via
#   hostname "redis" (DNS auto-resolved by Docker). No manual IPs needed.
#
# Secret Injection:
#   - API keys injected via env_file (.env) at RUNTIME only
#   - Firebase credentials bind-mounted read-only from ./secrets/
#   - NO secrets are baked into the image at build time
#
# Persistence:
#   - redis-data named volume survives container restarts
#   - To prove: docker compose down → docker compose up → data persists
#   - To wipe:  docker compose down -v (removes volumes)
#
# Lifecycle:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Rebuild: docker compose up -d --build
# =============================================================================

services:
  # ── Agent API Service ─────────────────────────────────────────────────────
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env                          # Injects GOOGLE_API_KEY, SERP_API_KEY, PINECONE_API_KEY
    environment:
      - REDIS_URL=redis://redis:6379  # Service discovery via Docker DNS
      - FIREBASE_CREDENTIALS_PATH=/app/secrets/firebase-credentials.json
    volumes:
      - ./secrets/firebase-credentials.json:/app/secrets/firebase-credentials.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - agent-network

  # ── Redis (Checkpoint / State Store) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: research-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data              # Named volume — persists across restarts
    command: redis-server --appendonly yes  # AOF persistence for durability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - agent-network

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local                      # Data survives docker compose down

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  agent-network:
    driver: bridge
